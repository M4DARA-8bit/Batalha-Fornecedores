<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>CG INTERNACIONAL</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 0;
    position: relative;
    overflow-x: hidden;
}

/* FUNDO ANIMADO */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: url('https://i.imgur.com/8EKeu2Q.png') no-repeat center center;
    background-size: cover;
    animation: zoomBg 20s infinite alternate ease-in-out;
    z-index: -2;
}

@keyframes zoomBg {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
}

/* OVERLAY CINEMATOGRAFICO */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(
        120deg,
        rgba(0,0,0,0.7),
        rgba(0,0,0,0.4)
    );
    backdrop-filter: blur(6px);
    z-index: -1;
}

/* CONTAINER */
.container {
    width: 420px;
    margin: 60px auto;
    background: rgba(255,255,255,0.95);
    padding: 25px;
    border-radius: 15px;
    position: relative;
    z-index: 1;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.4),
        0 0 20px rgba(45,137,239,0.3);

    animation: entrada 1s ease;
}

@keyframes entrada {
    from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* LOGO */
.logo {
    display: block;
    margin: 0 auto 15px;
    width: 120px;
    transition: 0.4s;
}

.logo:hover {
    transform: scale(1.08) rotate(2deg);
    filter: drop-shadow(0 0 10px rgba(45,137,239,0.7));
}

/* TITULO */
h1 {
    text-align: center;
    color: #1b5fbd;
}

/* NOME LADO A LADO */
.nome-linha {
    display: flex;
    gap: 10px;
}

.nome-linha input {
    width: 100%;
}

/* INPUT */
input {
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    width: 95%;
    transition: 0.3s;
}

input:focus {
    border-color: #2d89ef;
    box-shadow: 0 0 10px rgba(45,137,239,0.6);
    transform: scale(1.02);
    outline: none;
}

.input-erro { border: 2px solid red; }
.input-ok { border: 2px solid green; }

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, #2d89ef, #1b5fbd);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

/* LOG */
#log {
    margin-top: 20px;
}

.log-item {
    background: white;
    padding: 8px;
    margin-bottom: 6px;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    animation: slideIn 0.4s ease;
}

@keyframes slideIn {
    from {opacity: 0; transform: translateX(-20px);}
    to {opacity: 1; transform: translateX(0);}
}

.aprovado-badge {
    background: green;
    color: white;
    padding: 3px 6px;
}

.reprovado-badge {
    background: red;
    color: white;
    padding: 3px 6px;
}

/* LOADING */
#loading {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    z-index: 999;
}

.loader {
    border: 5px solid #fff;
    border-top: 5px solid #2d89ef;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    animation: spin 1s linear infinite;
    margin-bottom: 10px;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* POPUP */
#popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    z-index: 1000;
    opacity: 0;
    transition: 0.3s;
}

#popup.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

#popup button {
    margin-top: 15px;
    background: #2d89ef;
}

#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    z-index: 999;
}
</style>
</head>

<body>

<div class="container">

<img class="logo" src="https://i.imgur.com/dYl49HM.jpeg">

<h1>Painel de Inscrição</h1>

<div class="nome-linha">
<input type="text" id="nome" placeholder="Nome">
<input type="text" id="sobrenome" placeholder="Sobrenome">
</div>

<input type="text" id="cpf" placeholder="CPF">
<input type="text" id="endereco" placeholder="Endereço">
<input type="text" id="renda" placeholder="Renda Bruta Familiar">

<input type="file" id="arquivo" accept="application/pdf">

<button onclick="validar()">Enviar</button>

<div id="log"></div>

</div>

<div id="loading">
<div class="loader"></div>
<p>Processando cadastro...</p>
</div>

<div id="overlay"></div>

<div id="popup">
    <p id="popup-texto"></p>
    <button onclick="fecharPopup()">OK</button>
</div>

<script>
var nomeInput = document.getElementById("nome")
var sobrenomeInput = document.getElementById("sobrenome")
var cpfInput = document.getElementById("cpf")
var rendaInput = document.getElementById("renda")
var arquivoInput = document.getElementById("arquivo")

var cpfsCadastrados = []

// NOVO
var contadorArquivos = 1
var arquivoRenomeado = null

document.querySelectorAll("input").forEach(function(i){
    i.addEventListener("input", function(){
        i.value = i.value.toUpperCase()
    })
})

cpfInput.oninput = function() {
    var v = cpfInput.value.replace(/\D/g,"")
    v = v.slice(0,11)

    v = v.replace(/(\d{3})(\d)/,"$1.$2")
    v = v.replace(/(\d{3})(\d)/,"$1.$2")
    v = v.replace(/(\d{3})(\d{1,2})$/,"$1-$2")

    cpfInput.value = v
}

rendaInput.oninput = function() {
    var valor = rendaInput.value.replace(/\D/g,"")
    valor = (valor/100).toFixed(2)+""
    valor = valor.replace(".",",")
    valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g,".")
    rendaInput.value = "R$ " + valor
}

// NOVO
arquivoInput.onchange = function() {
    var arquivo = arquivoInput.files[0]

    if(arquivo && arquivo.type !== "application/pdf") {
        mostrarPopup("Apenas PDF permitido", "red")
        arquivoInput.value = ""
        return
    }

    if(arquivo) {
        var novoNome = contadorArquivos + ".pdf"

        arquivoRenomeado = new File([arquivo], novoNome, {
            type: "application/pdf"
        })

        console.log("Arquivo renomeado:", arquivoRenomeado.name)

        contadorArquivos++
    }
}

function mostrarPopup(texto, cor) {
    var popup = document.getElementById("popup")
    var overlay = document.getElementById("overlay")
    var textoPopup = document.getElementById("popup-texto")

    textoPopup.innerHTML = texto
    textoPopup.style.color = cor

    overlay.style.display = "block"
    popup.classList.add("show")
}

function fecharPopup() {
    document.getElementById("popup").classList.remove("show")
    document.getElementById("overlay").style.display = "none"
}

function validar() {

    var nome = nomeInput.value + " " + sobrenomeInput.value
    var cpf = cpfInput.value
    var renda = parseFloat(rendaInput.value.replace(/[^\d]/g,""))/100

    var log = document.getElementById("log")
    var loading = document.getElementById("loading")

    // NOVO BLOQUEIO
    if(!arquivoRenomeado) {
        mostrarPopup(
        "Por gentileza encaminhe o comprovante para finalizarmos sua inscrição",
        "red"
        )
        return
    }

    if(cpfsCadastrados.includes(cpf)) {
        mostrarPopup("CPF já cadastrado!", "red")
        return
    }

    if(!nomeInput.value || !sobrenomeInput.value || !cpf) {
        mostrarPopup("Preencha todos os campos", "red")
        return
    }

    loading.style.display = "flex"

    setTimeout(function(){

        loading.style.display = "none"
        cpfsCadastrados.push(cpf)

        if(renda > 1800) {

            mostrarPopup(
            "Sentimos muito, mas a sua renda é incompatível com as que estamos selecionando.<br><br>Muito obrigado!",
            "red"
            )

        } else {

            mostrarPopup(
            "Muito obrigado pela sua inscrição!<br>O seu comprovante está sendo analisado.",
            "green"
            )
        }

        // RESET
        arquivoRenomeado = null
        arquivoInput.value = ""

    },1500)
}
</script>

</body>
</html>
