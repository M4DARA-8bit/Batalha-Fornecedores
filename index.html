<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página em Manutenção</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    max-width:700px;
    padding:40px;
}

.icon{
    font-size:90px;
    margin-bottom:20px;
    animation:girar 4s linear infinite;
}

h1{
    font-size:42px;
    margin-bottom:15px;
}

p{
    font-size:18px;
    color:#cbd5e1;
    line-height:1.6;
}

.status{
    margin-top:25px;
    display:inline-block;
    background:#f59e0b;
    color:#111827;
    padding:10px 20px;
    border-radius:20px;
    font-weight:bold;
}

@keyframes girar{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="icon">⚙️</div>

    <h1>Página em Manutenção</h1>

    <p>
        A pagina teve alguns problemas com banco de dados e sincronização de informações.
        Em breve o sistema será avaliado para voltar as operações normais.
    </p>

    <div class="status">
        Avaliação e testes em Andamento.
    </div>
</div>

</body>
</html>
