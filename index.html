<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🛡️ Batalha de Fornecedores ⚔️ — Batalha_Fornecedores_V5</title>

<!-- Bibliotecas externas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* ==========================
   🔹 Variáveis de cores
========================== */
:root{
  --bg:#f0f4fb; 
  --card:#ffffff; 
  --primary:#1e3a8a; 
  --accent:#e6f0ff; 
  --muted:#6b7280;
  --success:#d1fae5; 
  --danger:#fee2e2;
}

/* ==========================
   🔹 Reset básico
========================== */
*{box-sizing:border-box}

/* ==========================
   🔹 Corpo da página
========================== */
body{
  font-family:Inter, Arial, sans-serif;
  background:var(--bg);
  color:#111827;
  margin:0;
  padding:0;
}

/* ==========================
   🔹 Cabeçalho
========================== */
.header{
  background:linear-gradient(90deg,#0f3b73,#1e6fb5);
  color:#fff;
  padding:12px 18px;
  position:sticky;
  top:0;
  z-index:40;
}
.header h1{
  margin:0;
  font-size:18px;
}

/* ==========================
   🔹 Containers e cards
========================== */
.container{ max-width:1400px; margin:18px auto; padding:12px; }
.block{
  background:var(--card);
  padding:14px;
  border-radius:10px;
  box-shadow:0 6px 18px rgba(16,24,40,0.04);
  margin-bottom:16px;
}

/* ==========================
   🔹 Inputs e botões
========================== */
.input{ padding:8px; border-radius:8px; border:1px solid #e6edf6; }
.button{ background:var(--primary); color:#fff; padding:8px 12px; border-radius:8px; border:none; cursor:pointer; font-weight:600; }
.button.small{ padding:6px 8px; font-size:13px; }
.btn-export{ padding:10px 14px; border-radius:8px; border:none; color:#fff; font-weight:700; cursor:pointer; }
.btn-pdf{ background:#d9534f; }

/* ==========================
   🔹 Tabela
========================== */
.tableWrapper{ overflow:auto; border-radius:8px; margin-top:12px; }
table{ border-collapse:collapse; width:100%; min-width:900px; }
th, td{ border-bottom:1px solid #eef2ff; padding:10px; text-align:center; vertical-align:middle; }
th{ background:var(--accent); color:var(--primary); font-weight:700; position:sticky; top:0; z-index:2; }
input.cell{ width:100%; padding:6px; border-radius:6px; border:1px solid #eef2ff; }
.best{ background:var(--success)!important; }

/* ==========================
   🔹 Cards de resumo
========================== */
.summaryGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:12px;
  margin-top:12px;
}
.card{
  background:linear-gradient(180deg,#fff,#f8fbff);
  padding:12px;
  border-radius:10px;
  border:1px solid #eef6ff;
  box-shadow:0 6px 18px rgba(16,24,40,0.04);
}

/* ==========================
   🔹 Legendas e estilos menores
========================== */
.legend{ font-size:13px; color:var(--muted); margin-top:8px; }
.td-small{ font-size:13px; padding:8px; }
.total-geral{
  margin-top:12px;
  padding:10px;
  border:2px solid #dbeafe;
  border-radius:8px;
  font-weight:700;
  background:linear-gradient(180deg,#fbfdff,#f7fbff);
  display:inline-block;
}
.filterRow{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
  margin-top:12px;
}
</style>
</head>
<body>

<!-- ==========================
     🔹 Header
========================== -->
<header class="header"><h1>🛡️ Batalha de Fornecedores ⚔️ </h1></header>

<div class="container">

  <!-- ==========================
       🔹 Configuração de Linhas/Colunas
  ========================== -->
  <div class="block">
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
      <label>Qtd. Itens: <input id="linhas" class="input" type="number" value="3" min="1"></label>
      <label>Qtd. Fornecedores: <input id="colunas" class="input" type="number" value="3" min="1"></label>
      <button id="btnAvancar" class="button">Avançar</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      <button class="button small" onclick="adicionarLinha()">+ Item</button>
      <button class="button small" onclick="adicionarColuna()">+ Fornecedor</button>
      <button class="button small" onclick="removerLinha()">- Item</button>
      <button class="button small" onclick="removerColuna()">- Fornecedor</button>
    </div>

    <hr style="margin:12px 0">

    <!-- ==========================
         🔹 Inserção em Massa
    ========================== -->
    <h3>Inserção em Massa (uma linha = um item)</h3>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:220px">
        <label>Descrição (uma por linha)</label>
        <textarea id="bulkDesc" class="input" style="width:100%;min-height:90px" placeholder="Descrição 1&#10;Descrição 2"></textarea>
      </div>
      <div style="width:160px">
        <label>Unidade (uma por linha)</label>
        <textarea id="bulkUnid" class="input" style="width:100%;min-height:90px" placeholder="UN&#10;KG"></textarea>
      </div>
      <div style="width:120px">
        <label>Quantidade (uma por linha)</label>
        <textarea id="bulkQtd" class="input" style="width:100%;min-height:90px" placeholder="1&#10;2"></textarea>
      </div>
      <div style="width:260px">
        <label>Valor Unitário (tab = múltiplos fornecedores)</label>
        <textarea id="bulkVal" class="input" style="width:100%;min-height:90px" placeholder="10,00&#09;12,50&#10;11,00&#09;13,00"></textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <select id="bulkValForn" class="input" style="flex:1">
            <option value="">Todos fornecedores</option>
          </select>
          <button id="btnBulkValAplicar" class="button small">Aplicar</button>
        </div>
        <div class="legend">Quebra de linha = novo item; tab = aplica para múltiplos fornecedores.</div>
      </div>
    </div>
  </div>

  <!-- ==========================
       🔹 Fornecedores
  ========================== -->
  <div id="fornecedoresContainer" class="block"></div>

  <!-- ==========================
       🔹 Tabela e filtro
  ========================== -->
  <div id="tabelaContainer" class="block">
    <div class="filterRow">
      <label>Filtro Fornecedor: </label>
      <select id="filterForn" class="input"><option value="">Mostrar todos</option></select>
      <button class="button small" id="btnClearFilter">Limpar filtro</button>
    </div>
    <div class="tableWrapper" id="tableWrapper"></div>
    <div id="valorTotalGeral"></div>
  </div>

  <!-- ==========================
       🔹 Resumo
  ========================== -->
  <div id="summaryArea" class="block" style="display:none"></div>

  <!-- ==========================
       🔹 Botão exportar PDF
  ========================== -->
  <div style="margin-top:12px;">
    <button class="btn-export btn-pdf" onclick="exportPDF()">Exportar PDF</button>
  </div>

</div>

<script>
/* ==========================
   🔹 Utilitários
========================== */
function esc(s){ if(s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function parseBR(v){ if(v==null||v==='') return NaN; v=String(v).trim().replace(/\./g,'').replace(',', '.'); const n=parseFloat(v); return isNaN(n)?NaN:n; }
function parseBRzero(v){ if(v==null||v==='') return 0; v=String(v).trim().replace(/\./g,'').replace(',', '.'); const n=parseFloat(v); return isNaN(n)?0:n; }
function fmtBR(n){ if(n==null||isNaN(n)) return ''; return n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }

/* ==========================
   🔹 Eventos iniciais
========================== */
document.getElementById('btnAvancar').addEventListener('click', gerarCamposFornecedores);
document.getElementById('btnClearFilter').addEventListener('click', ()=>{ document.getElementById('filterForn').value=''; applyFilter(); });
document.getElementById('btnBulkValAplicar').addEventListener('click', aplicarEmMassa);

/* ==========================
   🔹 Gerar campos fornecedores
========================== */
function gerarCamposFornecedores(){
  const col = parseInt(document.getElementById('colunas').value)||1;
  const cont = document.getElementById('fornecedoresContainer');
  let html = '<h3>Fornecedores</h3><div style="display:flex;gap:12px;flex-wrap:wrap">';
  for(let i=1;i<=col;i++){
    html += `<div style="min-width:220px" class="fornecedor-card">
      <label><strong>Fornecedor ${i}</strong></label>
      <input class="input" id="nomeForn${i}" value="Fornecedor ${i}" onchange="atualizarNomes()" style="font-size:13px">
      <label style="font-size:13px;margin-top:6px">Condição de Pagamento</label><input class="input" id="cond${i}" onchange="calcular()" style="font-size:13px">
      <label style="font-size:13px;margin-top:6px">Prazo de Entrega</label><input class="input" id="prazo${i}" onchange="calcular()" style="font-size:13px">
      <label style="font-size:13px;margin-top:6px">DIFAL (%)</label><input class="input" id="difalVal${i}" type="number" step="0.01" onchange="calcular()" style="font-size:13px">
      <label style="font-size:13px;margin-top:6px">Frete (R$)</label><input class="input" id="freteVal${i}" type="number" step="0.01" onchange="calcular()" style="font-size:13px">
    </div>`;
  }
  html += '</div>';
  cont.innerHTML = html;

  // atualizar opções de seleção em massa e filtro
  const sel = document.getElementById('bulkValForn');
  const fsel = document.getElementById('filterForn');
  sel.innerHTML = '<option value="">Escolher fornecedor...</option>';
  fsel.innerHTML = '<option value="">Mostrar todos</option>';
  for(let i=1;i<=col;i++){ 
    const name = document.getElementById('nomeForn'+i)?.value || 'Fornecedor '+i;
    sel.innerHTML += `<option value="${i}">${name}</option>`;
    fsel.innerHTML += `<option value="${i}">${name}</option>`;
  }

  gerarTabela();
}

/* ==========================
   🔹 Inserção em massa
========================== */
function aplicarEmMassa(){
  const sel = document.getElementById('bulkValForn').value;
  const raw = document.getElementById('bulkVal').value || '';
  const linesVal = raw.split(/\r?\n/).map(s=>s.trim()).filter(s=>s.length>0);
  const linesDesc = (document.getElementById('bulkDesc').value||'').split(/\r?\n/).map(s=>s.trim());
  const linesUnid = (document.getElementById('bulkUnid').value||'').split(/\r?\n/).map(s=>s.trim());
  const linesQtd = (document.getElementById('bulkQtd').value||'').split(/\r?\n/).map(s=>s.trim());

  if(sel){
    const f = parseInt(sel);
    const maxLines = Math.max(linesVal.length, linesDesc.length, linesUnid.length, linesQtd.length, parseInt(document.getElementById('linhas').value||0));
    if(maxLines > parseInt(document.getElementById('linhas').value||0)){
      document.getElementById('linhas').value = maxLines;
      gerarTabela();
    }
    for(let r=0;r<maxLines;r++){
      if(linesDesc[r]){ const d=document.getElementById('desc'+(r+1)); if(d) d.value = linesDesc[r]; }
      if(linesUnid[r]){ const u=document.getElementById('unid'+(r+1)); if(u) u.value = linesUnid[r]; }
      if(linesQtd[r]){ const q=document.getElementById('qtd'+(r+1)); if(q) q.value = linesQtd[r]; }
      if(linesVal[r]){ const v=document.getElementById(`valor${r+1}_${f}`); if(v) v.value = linesVal[r]; }
    }
    calcular();
    return;
  }

  if(!raw) return;
  const rows = raw.split(/\r?\n/).map(r => r.split(/\t/).map(c=>c.trim()));
  const maxRows = rows.length;
  if(maxRows > parseInt(document.getElementById('linhas').value||0)){
    document.getElementById('linhas').value = maxRows;
    gerarTabela();
  }
  for(let r=0;r<rows.length;r++){
    for(let f=0; f<rows[r].length; f++){
      const val = rows[r][f];
      const el = document.getElementById(`valor${r+1}_${f+1}`);
      if(el && val!==''){ el.value = val; el.dispatchEvent(new Event('input')); }
    }
    if(linesDesc[r]){ const d=document.getElementById('desc'+(r+1)); if(d) d.value = linesDesc[r]; }
    if(linesUnid[r]){ const u=document.getElementById('unid'+(r+1)); if(u) u.value = linesUnid[r]; }
    if(linesQtd[r]){ const q=document.getElementById('qtd'+(r+1)); if(q) q.value = linesQtd[r]; }
  }
  calcular();
}

/* ==========================
   🔹 Gerar tabela
========================== */
function gerarTabela(){
  const linhas = parseInt(document.getElementById('linhas').value)||1;
  const colunas = parseInt(document.getElementById('colunas').value)||1;
  let nomes = [];
  for(let i=1;i<=colunas;i++) nomes.push(document.getElementById('nomeForn'+i)?.value || `Fornecedor ${i}`);

  let html = `<div class="tableWrapper"><table id="tabelaQuadro"><thead><tr>
    <th style="min-width:260px">Descrição</th><th>Unid.</th><th>Qtd</th><th>IPI (%)</th>`;
  for(let c=1;c<=colunas;c++) html += `<th class="forncol col-${c}" style="min-width:120px">${esc(nomes[c-1])}<div style="font-size:11px;color:#666">Valor Unit.</div></th>`;
  html += `<th style="min-width:140px">Melhor Fornecedor</th><th style="min-width:140px">Valor Total (linha)</th></tr></thead><tbody>`;

  for(let r=1;r<=linhas;r++){
    html += `<tr id="row${r}">`;
    html += `<td class="td-small"><input class="cell" id="desc${r}" oninput="calcular()"></td>`;
    html += `<td class="td-small"><input class="cell" id="unid${r}" oninput="calcular()"></td>`;
    html += `<td class="td-small"><input class="cell" id="qtd${r}" value="1" oninput="calcular()"></td>`;
    html += `<td class="td-small"><input class="cell" id="ipi${r}" value="0" oninput="calcular()"></td>`;
    for(let c=1;c<=colunas;c++){
      html += `<td class="td-small forncol col-${c}"><input class="cell" id="valor${r}_${c}" oninput="calcular()"></td>`;
    }
    html += `<td class="td-small" id="melhor${r}"></td>`;
    html += `<td class="td-small" id="total${r}"></td>`;
    html += `</tr>`;
  }
  html += `</tbody></table></div>`;
  document.getElementById('tableWrapper').innerHTML = html;
  calcular();
}

/* ==========================
   🔹 Calcular totais
========================== */
function calcular(){
  const linhas = parseInt(document.getElementById('linhas').value)||1;
  const colunas = parseInt(document.getElementById('colunas').value)||1;
  let totalGeral=0;
  let melhorFornecedores=[];

  for(let r=1;r<=linhas;r++){
    let melhorVal = Infinity;
    let idxMelhor = 0;
    let qtd = parseBRzero(document.getElementById('qtd'+r).value);
    let ipi = parseBRzero(document.getElementById('ipi'+r).value);

    for(let c=1;c<=colunas;c++){
      const el = document.getElementById(`valor${r}_${c}`);
      let val = parseBRzero(el.value);
      val = val*(1+ipi/100);
      el.classList.remove('best');
      if(val<melhorVal){ melhorVal=val; idxMelhor=c; }
    }
    document.getElementById(`melhor${r}`).innerText = idxMelhor?document.getElementById('nomeForn'+idxMelhor)?.value:'';
    document.getElementById(`valor${r}_${idxMelhor}`)?.classList.add('best');
    const totalLinha = qtd*melhorVal;
    document.getElementById(`total${r}`).innerText = fmtBR(totalLinha);
    totalGeral += totalLinha;
    melhorFornecedores.push(idxMelhor?document.getElementById('nomeForn'+idxMelhor)?.value:'');
  }

  document.getElementById('valorTotalGeral').innerHTML = `<div class="total-geral">Total Geral: R$ ${fmtBR(totalGeral)}</div>`;

  // Resumo
  const resumo = {};
  melhorFornecedores.forEach(f=>{
    if(f){ resumo[f]=(resumo[f]||0)+1; }
  });
  let resumoHTML='<h3>Resumo de Itens por Fornecedor</h3><div class="summaryGrid">';
  for(const f in resumo){
    resumoHTML+=`<div class="card"><strong>${esc(f)}</strong><br>${resumo[f]} item(s)</div>`;
  }
  resumoHTML+='</div>';
  document.getElementById('summaryArea').innerHTML = resumoHTML;
  document.getElementById('summaryArea').style.display='block';
}

/* ==========================
   🔹 Atualizar nomes fornecedores
========================== */
function atualizarNomes(){
  const colunas = parseInt(document.getElementById('colunas').value)||1;
  const sel = document.getElementById('bulkValForn');
  const fsel = document.getElementById('filterForn');
  sel.innerHTML = '<option value="">Escolher fornecedor...</option>';
  fsel.innerHTML = '<option value="">Mostrar todos</option>';
  for(let i=1;i<=colunas;i++){
    const name = document.getElementById('nomeForn'+i)?.value || `Fornecedor ${i}`;
    sel.innerHTML += `<option value="${i}">${name}</option>`;
    fsel.innerHTML += `<option value="${i}">${name}</option>`;
  }
  gerarTabela();
}

/* ==========================
   🔹 Exportar PDF
========================== */
function exportPDF(){
  const tableEl = document.getElementById('tableWrapper');
  const summaryEl = document.getElementById('summaryArea');

  // Criar container temporário que terá tamanho grande suficiente
  const temp = document.createElement('div');
  temp.style.padding = '20px';
  temp.style.background = '#fff';
  temp.style.width = '210mm'; // tamanho aproximado A4 paisagem
  temp.style.boxSizing = 'border-box';
  temp.appendChild(tableEl.cloneNode(true));
  temp.appendChild(summaryEl.cloneNode(true));
  document.body.appendChild(temp);

  html2canvas(temp, {scale:2, useCORS:true, scrollY:-window.scrollY}).then(canvas=>{
    const img = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('l','mm','a4'); // landscape
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const imgProps = pdf.getImageProperties(img);
    const pdfHeight = (imgProps.height * pageWidth) / imgProps.width;

    // Se a altura da imagem for maior que a página, quebrar em várias páginas
    let heightLeft = pdfHeight;
    let position = 0;
    pdf.addImage(img, 'PNG', 0, position, pageWidth, pdfHeight);
    heightLeft -= pageHeight;

    while(heightLeft > 0){
      position = heightLeft - pdfHeight;
      pdf.addPage();
      pdf.addImage(img, 'PNG', 0, position, pageWidth, pdfHeight);
      heightLeft -= pageHeight;
    }

    pdf.save('Batalha_Fornecedores_V4_Resumo.pdf');
    document.body.removeChild(temp);
  }).catch(e=>{
    alert('Erro ao gerar PDF: ' + e.message);
    document.body.removeChild(temp);
  });
}

/* ==========================
   🔹 Adicionar / remover linhas e colunas
========================== */
function adicionarLinha(){ document.getElementById('linhas').value=parseInt(document.getElementById('linhas').value||0)+1; gerarTabela(); }
function removerLinha(){ let v=parseInt(document.getElementById('linhas').value||0); if(v>1){ document.getElementById('linhas').value=v-1; gerarTabela(); } }
function adicionarColuna(){ document.getElementById('colunas').value=parseInt(document.getElementById('colunas').value||0)+1; gerarCamposFornecedores(); }
function removerColuna(){ let v=parseInt(document.getElementById('colunas').value||0); if(v>1){ document.getElementById('colunas').value=v-1; gerarCamposFornecedores(); } }

/* ==========================
   🔹 Filtrar tabela por fornecedor
========================== */
document.getElementById('filterForn').addEventListener('change', applyFilter);
function applyFilter(){
  const val = document.getElementById('filterForn').value;
  const linhas = document.querySelectorAll('#tabelaQuadro tbody tr');
  linhas.forEach(row=>{
    if(!val){ row.style.display=''; return; }
    const melhor = row.querySelector('td[id^="melhor"]')?.innerText || '';
    const nome = document.getElementById('nomeForn'+val)?.value || '';
    row.style.display = melhor === nome ? '' : 'none';
  });
}
</script>

</body>
</html>
